name: sassedo

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    # Tuned for a small (~2 GiB) host: disable performance_schema (large fixed
    # memory cost), cap connections, and keep the InnoDB buffer pool modest.
    command: >-
      --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone=+00:00
      --performance_schema=OFF --max_connections=60 --innodb_buffer_pool_size=128M --table_open_cache=200
    mem_limit: 600m
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sassedodb}
      MYSQL_USER: ${MYSQL_USER:?set MYSQL_USER in .env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      TZ: UTC
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Hard cap so the JVM + native/off-heap memory cannot starve the host.
    # Pair with -Xmx in JAVA_OPTS; memswap_limit allows a little swap headroom.
    # Sized for -Xmx768m plus metaspace/thread-stack/native overhead (~360m).
    mem_limit: 1152m
    memswap_limit: 1664m
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: UTC
      LOG_PATH: /app/logs
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-sassedodb}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SASSEDO_APP_JWTSECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      SASSEDO_SEED_DEMOLISTINGS_ENABLED: "true"
      # One-time maintenance toggle: when true, recompresses oversized image blobs already stored in
      # the DB on startup (idempotent). Set to true in .env, restart once, then set back to false.
      SASSEDO_SHRINK_LARGE_IMAGES: ${SASSEDO_SHRINK_LARGE_IMAGES:-false}
      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    volumes:
      - app-logs:/app/logs
    networks:
      - backend
      - frontend
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN in .env}
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - frontend
    # Render the config template ourselves (the image only runs its envsubst step when the
    # command starts with "nginx"), then reload periodically so renewed certificates are
    # picked up without downtime.
    command: >-
      /bin/sh -c "envsubst '$$APP_DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && { while :; do sleep 6h & wait $${!}; nginx -s reload; done & } && exec nginx -g 'daemon off;'"

  certbot:
    # Pinned: certbot 3.x images run on Python 3.12 which hits a
    # "RecursionError: maximum recursion depth exceeded" during ACME requests.
    # v2.11.0 is the last Python 3.11-based release and works reliably.
    image: certbot/certbot:v2.11.0
    restart: unless-stopped
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks:
      - frontend
    # Attempt renewal twice a day; certbot only renews certs near expiry.
    entrypoint: >-
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

networks:
  backend:
    internal: true
  frontend:

volumes:
  mysql-data:
  app-logs:
  certbot-conf:
  certbot-www:
