spring.profiles.active=dev
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# App Properties
# Secret is injected via the SASSEDO_APP_JWTSECRET env var (empty by default so no secret is baked into the image).
# The dev profile supplies a local development value.
sassedo.app.jwtSecret=${SASSEDO_APP_JWTSECRET:}
sassedo.app.jwtExpirationMs=186144000000
# Payments: pluggable provider (mock | stripe). Stripe credentials stay server-side.
sassedo.payments.provider=${SASSEDO_PAYMENTS_PROVIDER:stripe}
sassedo.payments.stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_51Tvz6GRzAXFY20EHKT9RryzmDeNzZGoJVmTuEOKh8pnn4H9cLTfwqA5Aa0OC4u4LctulIGtXPOVMETSzraggBCAu00zo7dtwIy}
sassedo.payments.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:pk_test_51Tvz6GRzAXFY20EH2rlqZ2W5UnKtwXgpeYNVZpP4wzimIFiFZkwMZRQXOVd4OiCGEYi5AGg2vp2911plDW8cuiL500ShuVrulz}
sassedo.payments.stripe.client-url=${CLIENT_URL:http://localhost:3000}
# Promotion lifecycle sweep interval (ms)
sassedo.promotions.sweep-ms=60000
# Messaging realtime (SSE) settings
sassedo.messaging.sse.timeout-ms=1800000
sassedo.messaging.sse.heartbeat-ms=20000
sassedo.messaging.sse.max-connections-per-user=5
# Allow long-lived async (SSE) requests; -1 disables the MVC async timeout so the emitter timeout governs
spring.mvc.async.request-timeout=-1
# Open-Session-In-View must stay enabled: several controllers serialize lazy associations
# (e.g. User.roles in UserController.mapUserToResponse) outside a transaction. The SSE endpoint
# deliberately performs no JPA work on its request thread so it never pins a pooled connection.
spring.jpa.open-in-view=true
# Connection pool: give headroom over the default of 10 and surface leaks early. A held connection
# older than the threshold is logged, which flags any accidental long-lived JDBC checkout.
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.leak-detection-threshold=60000
# Listing expiration: default time-to-live in days and sweep interval (ms)
sassedo.listings.ttl-days=30
sassedo.listings.sweep-ms=3600000
sassedo.listings.sweep-initial-ms=45000
# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR
logging.config=classpath:log4j2.xml
#Hybernate Debug
#spring.jpa.properties.hibernate.format_sql=true
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
#logging.level.org.springframework.transaction=DEBUG
# Mail Properties
# Credentials are injected via SPRING_MAIL_* env vars; the dev profile supplies local values.
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
# Do not let unconfigured/unreachable SMTP mark the whole app DOWN (used by the container health check).
management.health.mail.enabled=false
# Expose Prometheus endpoint
management.endpoints.web.exposure.include=health,info,prometheus
# Enable the prometheus endpoint
management.endpoint.prometheus.enabled=true
# Optional: separate management port
management.server.port=8081
# Metrics configuration
management.prometheus.metrics.export.enabled=true
