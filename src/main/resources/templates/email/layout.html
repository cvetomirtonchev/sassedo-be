<!doctype html>
<html
        lang="bg"
        xmlns:th="http://www.thymeleaf.org"
        th:fragment="layout(pageTitle, preheader, content)"
>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">
    <title th:text="${pageTitle}">Sassedo</title>
    <style>
        :root {
            color-scheme: light;
            supported-color-schemes: light;
        }

        table,
        td {
            mso-table-lspace: 0;
            mso-table-rspace: 0;
        }

        img {
            -ms-interpolation-mode: bicubic;
        }

        @media screen and (max-width: 620px) {
            .email-shell {
                width: 100% !important;
            }

            .email-content {
                padding: 32px 20px !important;
            }

            .email-title {
                font-size: 22px !important;
            }

            .email-code {
                font-size: 25px !important;
                letter-spacing: 0.25em !important;
            }
        }
    </style>
</head>
<body
        style="width: 100%; margin: 0; padding: 0; background-color: #f5f5f5; color: #0a0a0a; font-family: Roboto, 'Public Sans', Arial, sans-serif; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;"
>
<div role="article" aria-roledescription="email" th:attr="aria-label=${pageTitle}">
    <div
            th:text="${preheader}"
            style="display: none; max-height: 0; max-width: 0; overflow: hidden; opacity: 0; color: transparent; mso-hide: all;"
    >
        Съобщение от Sassedo
    </div>

    <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            border="0"
            style="width: 100%; border-collapse: collapse; background-color: #f5f5f5;"
    >
        <tr>
            <td align="center" style="padding: 40px 16px;">
                <table
                        role="presentation"
                        class="email-shell"
                        width="600"
                        cellspacing="0"
                        cellpadding="0"
                        border="0"
                        style="width: 600px; max-width: 600px; border-collapse: separate; border-spacing: 0;"
                >
                    <tr>
                        <td
                                align="center"
                                bgcolor="#033c24"
                                style="padding: 24px 32px; background-color: #033c24; background-image: linear-gradient(120deg, #033c24, #064528 48%, #00361f); border-radius: 14px 14px 0 0; color: #ffffff;"
                        >
                            <img
                                    src="cid:sassedoLogo"
                                    width="184"
                                    height="45"
                                    alt="Sassedo"
                                    style="display: block; width: 184px; height: 45px; border: 0; outline: none; color: #ffffff; font-size: 24px; font-weight: 700; line-height: 45px; text-decoration: none;"
                            >
                        </td>
                    </tr>
                    <tr>
                        <td
                                class="email-content"
                                bgcolor="#ffffff"
                                style="padding: 40px 32px; background-color: #ffffff; border-right: 1px solid #e5e5e5; border-left: 1px solid #e5e5e5;"
                        >
                            <th:block th:replace="${content}">
                                <h1>Съобщение от Sassedo</h1>
                            </th:block>
                        </td>
                    </tr>
                    <tr>
                        <td
                                align="center"
                                bgcolor="#ffffff"
                                style="padding: 20px 32px; background-color: #ffffff; border: 1px solid #e5e5e5; border-top: 0; border-radius: 0 0 14px 14px; color: #737373; font-size: 12px; line-height: 1.5;"
                        >
                            Ако не сте заявили този имейл, моля игнорирайте го.
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</div>
</body>
</html>
