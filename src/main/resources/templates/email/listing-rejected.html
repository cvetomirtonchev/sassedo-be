<!doctype html><meta charset="UTF-8">
<html
        lang="bg"
        xmlns:th="http://www.thymeleaf.org"
        th:replace="~{email/layout :: layout(
            'Обявата ви не беше одобрена',
            'Прегледайте причината и редактирайте обявата си в Sassedo.',
            ~{::main}
        )}"
>
<body>
<main style="display: block;">
    <h1
            class="email-title"
            style="margin: 0 0 24px; color: #0a0a0a; font-size: 24px; font-weight: 500; line-height: 1.3;"
    >
        Обявата ви не беше одобрена
    </h1>
    <p style="margin: 0 0 16px; color: #0a0a0a; font-size: 16px; line-height: 1.5;">
        Здравейте, <strong th:text="${name}" style="font-weight: 500;">Име</strong>,
    </p>
    <p style="margin: 0 0 16px; color: #0a0a0a; font-size: 16px; line-height: 1.5;">
        Вашата обява
        <strong th:text="${listingTitle}" style="font-weight: 500;">Заглавие на обявата</strong>
        не беше одобрена.
    </p>
    <div
            style="margin: 0 0 24px; padding: 16px; background-color: #fff7ed; border: 1px solid #fed7aa; border-radius: 10px;"
    >
        <p style="margin: 0 0 8px; color: #7c2d12; font-size: 14px; font-weight: 600; line-height: 1.4;">
            Причина
        </p>
        <p
                th:text="${rejectionReason}"
                style="margin: 0; color: #431407; font-size: 16px; line-height: 1.5; white-space: pre-line;"
        >
            Причина за решението
        </p>
    </div>
    <p style="margin: 0 0 20px; color: #0a0a0a; font-size: 16px; line-height: 1.5;">
        Можете да редактирате обявата и да я изпратите отново за преглед.
    </p>
    <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            border="0"
            style="width: 100%; margin: 0; border-collapse: separate;"
    >
        <tr>
            <td align="center">
                <a
                        th:href="${editUrl}"
                        href="https://sassedo.com/"
                        style="display: inline-block; padding: 13px 24px; background-color: #033c24; border-radius: 8px; color: #ffffff; font-size: 16px; font-weight: 500; line-height: 1.25; text-decoration: none;"
                >
                    Редактирайте обявата
                </a>
            </td>
        </tr>
    </table>
</main>
</body>
</html>
