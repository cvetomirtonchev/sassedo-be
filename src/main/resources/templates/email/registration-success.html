<!doctype html>
<html
        lang="bg"
        xmlns:th="http://www.thymeleaf.org"
        th:replace="~{email/layout :: layout(
            'Успешна регистрация',
            'Профилът ви в Sassedo беше създаден успешно.',
            ~{::main}
        )}"
>
<body>
<main style="display: block;">
    <h1
            class="email-title"
            style="margin: 0 0 24px; color: #0a0a0a; font-size: 24px; font-weight: 500; line-height: 1.3;"
    >
        Успешна регистрация
    </h1>
    <p style="margin: 0 0 16px; color: #0a0a0a; font-size: 16px; line-height: 1.5;">
        Здравейте, <strong th:text="${name}" style="font-weight: 500;">Име</strong>,
    </p>
    <p style="margin: 0 0 16px; color: #0a0a0a; font-size: 16px; line-height: 1.5;">
        Профилът ви в Sassedo беше създаден успешно.
    </p>
    <p style="margin: 0; color: #0a0a0a; font-size: 16px; line-height: 1.5;">
        Благодарим ви!
    </p>
</main>
</body>
</html>
