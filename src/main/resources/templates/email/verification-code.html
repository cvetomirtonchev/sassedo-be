<!doctype html><meta charset="UTF-8">
<html
        lang="bg"
        xmlns:th="http://www.thymeleaf.org"
        th:replace="~{email/layout :: layout(
            'Потвърдете вашия имейл',
            'Използвайте кода, за да потвърдите имейл адреса си в Sassedo.',
            ~{::main}
        )}"
>
<body>
<main style="display: block;">
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <h1
            class="email-title"
            style="margin: 0 0 24px; color: #0a0a0a; font-size: 24px; font-weight: 500; line-height: 1.3;"
    >
        Потвърдете вашия имейл
    </h1>
    <p style="margin: 0 0 16px; color: #0a0a0a; font-size: 16px; line-height: 1.5;">
        Уважаеми <strong th:text="${name}" style="font-weight: 500;">Име</strong>,
    </p>
    <p style="margin: 0 0 16px; color: #0a0a0a; font-size: 16px; line-height: 1.5;">
        Вашият код за потвърждение е:
    </p>
    <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            border="0"
            style="width: 100%; margin: 0 0 24px; border-collapse: separate;"
    >
        <tr>
            <td
                    align="center"
                    bgcolor="#eaf6e9"
                    style="padding: 18px 16px; background-color: #eaf6e9; border: 1px solid #d7ecd5; border-radius: 10px;"
            >
                <span
                        class="email-code"
                        th:text="${code}"
                        style="display: inline-block; color: #1a2c3a; font-family: 'Courier New', Courier, monospace; font-size: 28px; font-weight: 700; line-height: 1.2; letter-spacing: 0.35em; font-variant-numeric: tabular-nums;"
                >000000</span>
            </td>
        </tr>
    </table>
    <p style="margin: 0; color: #0a0a0a; font-size: 16px; line-height: 1.5;">
        Благодарим ви!
    </p>
</main>
</body>
</html>
