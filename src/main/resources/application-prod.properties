# All values are supplied at runtime via environment variables (see compose.yaml / .env).
# Defaults are non-sensitive fallbacks so no secret is baked into the image.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sassedodb?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
# Never seed demo listings in production.
sassedo.seed.demo-listings.enabled=${SASSEDO_SEED_DEMOLISTINGS_ENABLED:false}
